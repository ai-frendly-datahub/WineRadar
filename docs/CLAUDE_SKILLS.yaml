skills:
  - name: code_review
    description: >-
      변경 사항의 버그, 리스크, 회귀 가능성을 찾고 테스트/문서 보강을 제안한다.
  - name: tdd_coding
    description: >-
      pytest 기반 테스트를 먼저 작성하고, 최소 구현 후 리팩터링 사이클을 따른다.
  - name: docs_update
    description: >-
      README/설계/배포 문서를 최신 상태로 유지하고, 한글로 명확히 기술한다.
  - name: ops_debug
    description: >-
      GitHub Actions, Pages, Telegram 등 운영 환경의 에러를 재현하고 해결책을 제시한다.
