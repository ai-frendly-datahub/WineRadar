name: WineRadar Crawler

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"  # 매일 00:00 UTC (한국 기준 오전 9시)

jobs:
  crawl-and-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run WineRadar
        run: |
          python main.py

      # 필요 시, GitHub Pages 배포 스텝 등을 추가하면 됨
