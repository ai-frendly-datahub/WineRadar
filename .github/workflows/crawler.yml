name: WineRadar Crawler

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "0 23 * * *"  # 매일 23:00 UTC (KST 08:00+1)

permissions:
  contents: write

concurrency:
  group: wineradar-collection
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  crawl-and-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "radar-core @ git+https://github.com/ai-frendly-datahub/radar-core.git@main"
          pip install -r requirements.txt

      - name: Run WineRadar Collector
        env:
          TZ: Asia/Seoul
        run: |
          python main.py --mode once --generate-report --report-dir reports --snapshot-db --keep-raw-days 180 --keep-report-days 90

      - name: Generate index.html
        run: |
          python -c "from wineradar.reporter import generate_index_html; from pathlib import Path; generate_index_html(Path('reports'))"

      - name: Run Quality Checks
        if: always()
        run: |
          python scripts/check_quality.py > quality_report.txt 2>&1 || true
          cat quality_report.txt >> $GITHUB_STEP_SUMMARY
        continue-on-error: true

      - name: Archive Quality Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-report-${{ github.run_number }}
          path: quality_report.txt
          retention-days: 30

      - name: Verify dated data artifact
        run: |
          set -euo pipefail
          dates="$(date -u +%F) $(TZ=Asia/Seoul date +%F)"
          found=0
          for d in $dates; do
            if find "data/raw/$d" -type f ! -name ".gitkeep" -print -quit 2>/dev/null | grep -q .; then found=1; fi
            if find "data/snapshots/$d" -type f ! -name ".gitkeep" -print -quit 2>/dev/null | grep -q .; then found=1; fi
            if find "data/daily" -maxdepth 1 -type f -name "$d*" -print -quit 2>/dev/null | grep -q .; then found=1; fi
          done
          if [ "$found" -eq 0 ]; then
            echo "::error::No dated data artifact found for UTC/KST dates: $dates"
            find data -maxdepth 3 -type f \( -path "*/raw/*" -o -path "*/daily/*" -o -path "*/snapshots/*" \) | sort | tail -50 || true
            exit 1
          fi

      - name: Auto-commit data updates
        continue-on-error: true
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add -f data/ reports/ 2>/dev/null || true
          git diff --staged --quiet || git commit -m "chore: update radar data [skip ci]"
          git push || true

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./reports
          publish_branch: gh-pages
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'docs: Update daily report'

      - name: Archive database (backup)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: wineradar-db-${{ github.run_number }}
          path: data/wineradar.duckdb
          retention-days: 30
