name: WineRadar Crawler

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "0 23 * * *"  # 매일 23:00 UTC (KST 08:00+1)

permissions:
  contents: write

concurrency:
  group: wineradar-collection
  cancel-in-progress: false

jobs:
  crawl-and-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run WineRadar Collector
        env:
          TZ: Asia/Seoul
        run: |
          python main.py --mode once --generate-report

      - name: Run Quality Checks
        if: always()
        run: |
          python scripts/check_quality.py > quality_report.txt 2>&1 || true
          cat quality_report.txt >> $GITHUB_STEP_SUMMARY
        continue-on-error: true

      - name: Archive Quality Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-report-${{ github.run_number }}
          path: quality_report.txt
          retention-days: 30

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs/reports
          publish_branch: gh-pages
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'docs: Update daily report'

      - name: Archive database (backup)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: wineradar-db-${{ github.run_number }}
          path: data/wineradar.duckdb
          retention-days: 30
