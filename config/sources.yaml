data_quality:
  priority: P1
  primary_motion: intelligence
  weakest_dimension: operational_depth
  quality_outputs:
    freshness_report: reports/wine_quality.json
    dated_freshness_report_pattern: reports/wine_YYYYMMDD_quality.json
    tracked_event_models:
    - auction_price
    - restaurant_wine_list
    - importer_portfolio_signal
    - market_report
    - daily_briefing
    - education
  event_models:
    auction_price:
      date_fields:
      - auction_date
      - collected_at
      required_fields:
      - producer
      - wine_name
      - vintage
      - hammer_price
      - currency
    restaurant_wine_list:
      date_fields:
      - list_updated_at
      - collected_at
      required_fields:
      - restaurant_name
      - producer
      - wine_name
      - list_price
    importer_portfolio_signal:
      date_fields:
      - published_date
      - collected_at
      required_fields:
      - importer_name
      - producer
      - wine_name
      - source_url
  canonical_keys:
    wine:
    - producer
    - wine_name
    - vintage
    - appellation
    auction_lot:
    - wine_key
    - auction_house
    - auction_date
    - lot_id
  freshness_sla:
    daily_briefing:
      max_age_days: 3
    market_report:
      max_age_days: 7
    education:
      max_age_days: 30
    auction_price:
      max_age_days: 7
    restaurant_wine_list:
      max_age_days: 14
    importer_portfolio_signal:
      max_age_days: 14
  quality_gates:
  - 생산자·와인명·빈티지·appellation을 canonical wine key로 정규화
  - 낙찰일·리스트 업데이트일·수집일을 별도 필드로 유지
  - 비활성 고가치 source는 skip 사유와 재시도 정책을 남김
source_backlog:
  operational_candidates:
  - id: market_livex_gb
    name: Liv-ex Market Data
    event_model: auction_price
    layer: operational
    activation_gate: API 또는 CSV 접근 계약, vintage/producer canonicalization, currency normalization 검증 후 활성화
  - id: market_sothebys_us
    name: Sotheby's Wine Auction Results
    event_model: auction_price
    layer: operational
    activation_gate: robots/ToS, lot permalink, hammer price parser 검증 후 활성화
  - id: market_restaurantwine_kr
    name: Korean restaurant wine list pages
    event_model: restaurant_wine_list
    layer: operational
    activation_gate: 개별 업장 페이지 접근성, 가격/빈티지 parser, 업데이트일 추출 검증 후 활성화
